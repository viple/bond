<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可转债数据下载工具</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --brand: #0d6efd;
            --brand-light: #e8f0fe;
            --success: #198754;
            --warning: #ffc107;
            --danger: #dc3545;
        }
        body { background: #f5f7fb; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .navbar-brand i { font-size: 1.5rem; margin-right: 8px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 1.25rem; }
        .card-header {
            background: #fff; border-bottom: 1px solid #f0f0f0; border-radius: 12px 12px 0 0 !important;
            font-weight: 600; padding: 1rem 1.25rem; display: flex; align-items: center; gap: 8px;
        }
        .card-body { padding: 1.25rem; }
        .card-header i { font-size: 1.1rem; color: var(--brand); }

        .progress { height: 28px; border-radius: 14px; background: #e9ecef; }
        .progress-bar { border-radius: 14px; font-size: .8rem; font-weight: 600; transition: width .3s ease; }
        .progress-bar.running { background: var(--brand); }
        .progress-bar.done { background: var(--success); }
        .progress-bar.error { background: var(--danger); }

        .stat-card { text-align: center; padding: .75rem; }
        .stat-card .value { font-size: 1.75rem; font-weight: 700; color: var(--brand); }
        .stat-card .label { font-size: .8rem; color: #6c757d; margin-top: 2px; }

        .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 14px; border-radius: 20px; font-size: .85rem; font-weight: 500; }
        .status-badge.idle { background: #f0f0f0; color: #666; }
        .status-badge.running { background: #cfe2ff; color: #084298; }
        .status-badge.completed { background: #d1e7dd; color: #0f5132; }
        .status-badge.error { background: #f8d7da; color: #842029; }

        .log-box {
            background: #1e1e1e; color: #d4d4d4; border-radius: 8px; padding: 12px;
            font-family: "Cascadia Code", "Fira Code", "Consolas", monospace; font-size: .8rem;
            height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
        }
        .log-box .error-line { color: #f48771; }
        .log-box .info-line { color: #6fc1ff; }
        .log-box .done-line { color: #89d185; }

        .table-wrap { overflow-x: auto; max-height: 400px; overflow-y: auto; }
        .table-wrap table { font-size: .85rem; }
        .table-wrap thead th { position: sticky; top: 0; background: #f8f9fa; z-index: 1; }
        .table-wrap td, .table-wrap th { white-space: nowrap; padding: .4rem .6rem; }

        .btn-primary { border-radius: 8px; padding: .5rem 1.5rem; font-weight: 500; }
        .btn-outline-secondary { border-radius: 8px; }

        .spinner { display: inline-block; width: 1rem; height: 1rem; border: 2px solid #fff; border-right-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 4px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<nav class="navbar navbar-light bg-white shadow-sm">
    <div class="container">
        <span class="navbar-brand mb-0 h1"><i class="bi bi-graph-up-arrow"></i>可转债数据下载器</span>
        <span id="statusBadge" class="status-badge idle"><i class="bi bi-dash-circle"></i>就绪</span>
    </div>
</nav>

<div class="container py-4">

    <!-- 控制面板 -->
    <div class="card">
        <div class="card-header"><i class="bi bi-gear"></i>控制面板</div>
        <div class="card-body">
            <div class="row align-items-center g-3">
                <div class="col-md-auto">
                    <button id="startBtn" class="btn btn-primary">
                        <i class="bi bi-play-fill"></i> 开始下载
                    </button>
                </div>
                <div class="col-md-auto">
                    <button id="refreshBtn" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-clockwise"></i> 刷新状态
                    </button>
                </div>
                <div class="col-md-auto">
                    <button id="previewBtn" class="btn btn-outline-secondary">
                        <i class="bi bi-table"></i> 刷新预览
                    </button>
                </div>
                <div class="col-md text-md-end text-muted small" id="currentInfo">
                    当前: -- | 状态: idle
                </div>
            </div>
        </div>
    </div>

    <!-- 进度面板 -->
    <div class="card">
        <div class="card-header"><i class="bi bi-bar-chart-fill"></i>下载进度</div>
        <div class="card-body">
            <div class="progress mb-2">
                <div id="progressBar" class="progress-bar" role="progressbar" style="width:0%">0%</div>
            </div>
            <div class="row text-center g-2" id="statsRow">
                <div class="col-4 col-md-3 stat-card">
                    <div class="value" id="statTotal">0</div>
                    <div class="label">总计</div>
                </div>
                <div class="col-4 col-md-3 stat-card">
                    <div class="value" id="statDone">0</div>
                    <div class="label">已完成</div>
                </div>
                <div class="col-4 col-md-3 stat-card">
                    <div class="value" id="statErrors">0</div>
                    <div class="label">错误</div>
                </div>
                <div class="col-6 col-md-3 stat-card">
                    <div class="value" id="statFailed">0</div>
                    <div class="label">失败</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 日志面板 -->
    <div class="row g-3">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header"><i class="bi bi-info-circle"></i>运行日志</div>
                <div class="card-body p-2">
                    <div id="infoLog" class="log-box"></div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card">
                <div class="card-header text-danger"><i class="bi bi-exclamation-triangle-fill"></i>错误记录</div>
                <div class="card-body p-2">
                    <div id="errorLog" class="log-box"><span class="text-muted">暂无错误</span></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 数据预览 -->
    <div class="card">
        <div class="card-header"><i class="bi bi-eye"></i>数据预览（汇总文件最近20行）</div>
        <div class="card-body p-0">
            <div class="table-wrap" id="previewWrap">
                <table class="table table-sm table-bordered table-striped mb-0">
                    <thead id="previewHead"><tr><th>暂无数据</th></tr></thead>
                    <tbody id="previewBody"></tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
(function() {
    let pollTimer = null;
    let pollActive = false;

    // ----- 工具函数 -----
    function statusText(s) {
        const map = { idle: '就绪', running: '运行中', completed: '已完成', error: '出错' };
        return map[s] || s;
    }

    function badgeHtml(s) {
        const map = {
            idle:    '<i class="bi bi-dash-circle"></i>' + statusText(s),
            running: '<span class="spinner"></span>' + statusText(s),
            completed: '<i class="bi bi-check-circle-fill"></i>' + statusText(s),
            error:   '<i class="bi bi-x-circle-fill"></i>' + statusText(s)
        };
        return map[s] || map['idle'];
    }

    function fmtTime() {
        return new Date().toLocaleTimeString();
    }

    // ----- 更新进度/状态 -----
    function updateProgress() {
        $.get('/api/progress', function(d) {
            var pct = d.total > 0 ? (d.current / d.total * 100).toFixed(1) : 0;
            var isRunning = d.status === 'running';

            // 进度条
            var bar = $('#progressBar');
            if (isRunning) { bar.removeClass('done error').addClass('running'); }
            else if (d.status === 'completed') { bar.removeClass('running error').addClass('done'); }
            else if (d.status === 'error') { bar.removeClass('running done').addClass('error'); }
            else { bar.removeClass('running done error'); }
            bar.css('width', pct + '%').text(pct + '%');

            // 状态徽章
            var badge = $('#statusBadge');
            badge.attr('class', 'status-badge ' + d.status).html(badgeHtml(d.status));
            $('#currentInfo').html('当前: ' + (d.current_name || '--') + ' | 状态: ' + statusText(d.status));

            // 统计
            $('#statTotal').text(d.total);
            $('#statDone').text(d.current);
            var errCount = Array.isArray(d.errors) ? d.errors.length : 0;
            $('#statErrors').text(errCount);
            $('#statFailed').text(d.total > 0 ? d.total - d.current : 0);

            // 日志
            if (d.message) {
                var cls = isRunning ? 'info-line' : 'done-line';
                var logLine = '<div class="' + cls + '">[' + fmtTime() + '] ' + $('<span>').text(d.message).html() + '</div>';
                var el = $('#infoLog');
                el.prepend(logLine);
                if (el.children().length > 50) el.children().slice(50).remove();
            }

            // 错误日志
            if (Array.isArray(d.errors) && d.errors.length) {
                var errEl = $('#errorLog');
                errEl.empty();
                for (var i = d.errors.length - 1; i >= Math.max(0, d.errors.length - 30); i--) {
                    errEl.append('<div class="error-line">[' + fmtTime() + '] ' + $('<span>').text(d.errors[i]).html() + '</div>');
                }
            }

            // 轮询控制
            if (isRunning) {
                if (!pollActive) { pollActive = true; pollTimer = setInterval(updateProgress, 2000); }
            } else {
                if (pollActive) { clearInterval(pollTimer); pollTimer = null; pollActive = false; }
            }
        }).fail(function() {
            // 请求失败时停止轮询
            if (pollActive) { clearInterval(pollTimer); pollTimer = null; pollActive = false; }
        });
    }

    // ----- 预览数据 -----
    function loadPreview() {
        $.get('/api/preview', function(res) {
            if (res.error) {
                $('#previewHead').html('<tr><th>提示</th></tr>');
                $('#previewBody').html('<tr><td class="text-muted">' + res.error + '</td></tr>');
                return;
            }
            if (!res.columns || !res.data || res.data.length === 0) {
                $('#previewHead').html('<tr><th>提示</th></tr>');
                $('#previewBody').html('<tr><td class="text-muted">暂无数据，请先下载</td></tr>');
                return;
            }
            var thead = '<tr>' + res.columns.map(function(c) { return '<th>' + $('<span>').text(c).html() + '</th>'; }).join('') + '</tr>';
            var tbody = '';
            res.data.forEach(function(row) {
                tbody += '<tr>' + res.columns.map(function(c) {
                    var v = row[c];
                    if (v === null || v === undefined) v = '';
                    return '<td>' + $('<span>').text(v).html() + '</td>';
                }).join('') + '</tr>';
            });
            $('#previewHead').html(thead);
            $('#previewBody').html(tbody);
        }).fail(function() {
            $('#previewHead').html('<tr><th>错误</th></tr>');
            $('#previewBody').html('<tr><td class="text-danger">预览请求失败</td></tr>');
        });
    }

    // ----- 事件绑定 -----
    $('#startBtn').click(function() {
        var btn = $(this);
        btn.prop('disabled', true).html('<span class="spinner"></span> 启动中...');
        $.post('/api/start', function() {
            btn.prop('disabled', false).html('<i class="bi bi-play-fill"></i> 开始下载');
            updateProgress();
        }).fail(function(xhr) {
            btn.prop('disabled', false).html('<i class="bi bi-play-fill"></i> 开始下载');
            var msg = '启动失败';
            try { msg = JSON.parse(xhr.responseText).error || msg; } catch(e) {}
            alert(msg);
        });
    });

    $('#refreshBtn').click(function() { updateProgress(); });
    $('#previewBtn').click(function() { loadPreview(); });

    // ----- 初始化加载 -----
    loadPreview();
    updateProgress();
})();
</script>
</body>
</html>
