<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可转债数据下载工具</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        .progress { height: 30px; }
        .log-area { height: 200px; overflow-y: auto; background: #f8f9fa; padding: 10px; font-family: monospace; }
        .error-area { height: 150px; overflow-y: auto; background: #f8d7da; color: #721c24; padding: 10px; font-family: monospace; }
    </style>
</head>
<body>
<div class="container mt-4">
    <h2>可转债日线数据下载器</h2>
    <div class="row mt-3">
        <div class="col-md-6">
            <button id="startBtn" class="btn btn-primary btn-lg">开始下载</button>
            <button id="refreshBtn" class="btn btn-secondary btn-lg">刷新状态</button>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-md-12">
            <h5>下载进度</h5>
            <div class="progress">
                <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%">0%</div>
            </div>
            <div id="statusMsg" class="mt-2"></div>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-md-6">
            <h5>状态信息</h5>
            <div id="infoLog" class="log-area"></div>
        </div>
        <div class="col-md-6">
            <h5>错误记录</h5>
            <div id="errorLog" class="error-area"></div>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-md-12">
            <h5>最近数据预览（汇总文件最后20行）</h5>
            <button id="previewBtn" class="btn btn-info btn-sm mb-2">刷新预览</button>
            <div style="overflow-x: auto;">
                <table id="previewTable" class="table table-sm table-bordered table-striped">
                    <thead><tr><th>暂无数据</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let refreshInterval = null;

    function updateProgress() {
        $.get('/api/progress', function(data) {
            let percent = 0;
            if (data.total > 0) {
                percent = (data.current / data.total * 100).toFixed(1);
            }
            $('#progressBar').css('width', percent + '%').text(percent + '%');
            $('#statusMsg').html(`当前：${data.current_name}(${data.current_code}) | 进度：${data.current}/${data.total} | 状态：${data.status}<br>消息：${data.message}`);
            // 信息日志（保留最近10条）
            let infoHtml = `<div>[${new Date().toLocaleTimeString()}] ${data.message}</div>`;
            $('#infoLog').prepend(infoHtml);
            if ($('#infoLog').children().length > 20) $('#infoLog').children().slice(20).remove();

            // 错误日志
            if (data.errors && data.errors.length) {
                let errHtml = '';
                data.errors.slice().reverse().forEach(e => {
                    errHtml += `<div>[${new Date().toLocaleTimeString()}] ${e}</div>`;
                });
                $('#errorLog').html(errHtml);
            }
        });
    }

    function loadPreview() {
        $.get('/api/preview', function(res) {
            if (res.error) {
                $('#previewTable thead').html('<tr><th>错误</th></tr>');
                $('#previewTable tbody').html(`<tr><td>${res.error}</td></tr>`);
                return;
            }
            let columns = res.columns;
            let thead = '<tr>' + columns.map(c => `<th>${c}</th>`).join('') + '</tr>';
            let tbody = '';
            for (let row of res.data) {
                tbody += '<tr>' + columns.map(c => `<td>${row[c] !== undefined ? row[c] : ''}</td>`).join('') + '</tr>';
            }
            $('#previewTable thead').html(thead);
            $('#previewTable tbody').html(tbody);
        }).fail(function() {
            $('#previewTable thead').html('<tr><th>预览失败</th></tr>');
            $('#previewTable tbody').html('<tr><td>请确保汇总文件存在</td></tr>');
        });
    }

    $('#startBtn').click(function() {
        $.post('/api/start', function() {
            alert('下载任务已启动，请稍后刷新状态');
            if (!refreshInterval) {
                refreshInterval = setInterval(updateProgress, 2000);
            }
        }).fail(function() {
            alert('启动失败，可能已有任务在运行');
        });
    });

    $('#refreshBtn').click(function() {
        updateProgress();
        loadPreview();
    });

    $('#previewBtn').click(function() {
        loadPreview();
    });

    // 初始加载预览
    loadPreview();
    // 不自动刷新，让用户手动点击刷新按钮
</script>
</body>
</html>
